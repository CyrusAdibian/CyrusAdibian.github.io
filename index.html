<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=NetGuard/">
  <title>نت‌گارد</title>
  <link href="https://cdn.jsdelivr.net/gh/hemedani/yekan@v3.0.0/font-face.css" rel="stylesheet" type="text/css">
  <link rel="icon" href="NetGuard/assets/icon.png" type="image/png" sizes="512x512">
  <link rel="apple-touch-icon" href="NetGuard/assets/icon.png">
  <style>
    body { font-family: 'Yekan', Tahoma, sans-serif; }
    html[dir="rtl"] [lang="en"],
    html[dir="ltr"] [lang="fa"] { display: none; }
  </style>
  <script>
    (function () {
      var lang = localStorage.getItem('netguard-language') === 'en' ? 'en' : 'fa';
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
      document.title = lang === 'en' ? 'NetGuard' : 'نت‌گارد';
      location.replace('NetGuard/');
    })();
  </script>
</head>
<body>
  <p>
    <span lang="fa" dir="rtl">در حال انتقال به <a href="NetGuard/">نت‌گارد</a>…</span>
    <span lang="en" dir="ltr">Redirecting to <a href="NetGuard/">NetGuard</a>...</span>
  </p>
</body>
</html>
